name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "labtether-cli-${SUFFIX}" \
            .

      - name: Create tarball
        if: matrix.archive == 'tar.gz'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          tar czf "labtether-cli-${SUFFIX}-${VERSION}.tar.gz" "labtether-cli-${SUFFIX}"
          sha256sum "labtether-cli-${SUFFIX}-${VERSION}.tar.gz" > "labtether-cli-${SUFFIX}-${VERSION}.tar.gz.sha256"

      - name: Create zip
        if: matrix.archive == 'zip'
        env:
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          zip "labtether-cli-${SUFFIX}-${VERSION}.zip" "labtether-cli-${SUFFIX}"
          sha256sum "labtether-cli-${SUFFIX}-${VERSION}.zip" > "labtether-cli-${SUFFIX}-${VERSION}.zip.sha256"

      - name: Checksum raw binary
        env:
          SUFFIX: ${{ matrix.suffix }}
        run: |
          sha256sum "labtether-cli-${SUFFIX}" > "labtether-cli-${SUFFIX}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            labtether-cli-${{ matrix.suffix }}
            labtether-cli-${{ matrix.suffix }}.sha256
            labtether-cli-*.tar.gz
            labtether-cli-*.tar.gz.sha256
            labtether-cli-*.zip
            labtether-cli-*.zip.sha256
